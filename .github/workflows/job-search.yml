name: QA Job Search Automation

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/job-search.yml"
      - "job_scraper.py"
      - "job_pipeline/**"
      - "requirements.txt"
      - "scripts/run_pipeline.sh"
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  run-search:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: ./scripts/run_pipeline.sh

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: Daily QA Job Report
          to: harshavardhanvallabhaneni@gmail.com
          from: QA Job Search Bot
          attachments: artifacts/jobs.xlsx
